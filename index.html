<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jayanth Mobile Service V39</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #13131a;
            --primary: #00e5ff;
            --accent: #69ff47;
            --danger: #ff1744;
            --text: #e0e0e0;
            --border: rgba(255,255,255,0.07);
        }
        /* ಪೂರ್ಣ ವಿನ್ಯಾಸಕ್ಕಾಗಿ ನಿಮ್ಮ ಫೈಲ್‌ನಲ್ಲಿರುವಂತೆ ಸುಂದರವಾದ ಡಾರ್ಕ್ ಥೀಮ್ ಬಳಸಲಾಗಿದೆ */
        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            padding-bottom: 80px;
        }
        /* Header ಮತ್ತು Navigation ವಿನ್ಯಾಸಗಳು */
        header {
            background: rgba(10,10,12,0.95); padding: 13px 18px;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 66px;
            background: rgba(10,10,12,0.97); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
        }
        /* ಉಳಿದ ಎಲ್ಲಾ CSS ಶೈಲಿಗಳು ಇಲ್ಲಿ ಮುಂದುವರಿಯುತ್ತವೆ... */
    </style>
</head>
